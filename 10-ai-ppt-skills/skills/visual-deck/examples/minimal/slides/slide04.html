<!DOCTYPE html>
<!--
  slide-2col.html · 双栏对比 · 左右各一列，中间细分隔

  USE WHEN:
    - 二元对比：before / after、old / new、问题 / 方案、A / B
    - 两栏分量相当（各有 title + 2~3 条要点）
    - 需要观众同时扫两边快速比较

  DO NOT USE WHEN:
    - 一方详、一方略 → 用 r34（把略的那方放图，详的放文字）
    - 对比超过两项 → 用 3col 或拆页
    - 左右本质是顺序（先 A 后 B）→ 用 timeline

  主题变量取自 ../themes/*.css。
-->
<html lang="zh">
<head><meta charset="UTF-8">
<link rel="stylesheet" href="../themes/dark-coral.css">
<style>
html { background: var(--bg); }
body {
  width: var(--slide-w); height: var(--slide-h); margin: 0; padding: 0;
  font-family: var(--font-sans); color: var(--fg); background: var(--bg);
  position: relative;
}
.slide {
  width: var(--slide-w); height: var(--slide-h);
  padding: var(--pad-slide); box-sizing: border-box;
  display: flex; flex-direction: column;
}
.eyebrow { font-weight: var(--fw-light); font-size: var(--fs-label); letter-spacing: 3pt; color: var(--accent); margin: 0 0 6pt 0; }
.title { font-size: var(--fs-title); font-weight: var(--fw-bold); color: #FFFFFF; margin: 0 0 18pt 0; line-height: 1.2; }
.title .accent { color: var(--accent); }

.cols { display: flex; flex-direction: row; gap: 48pt; flex: 1; }
.col { flex: 1; display: flex; flex-direction: column; }
.col-label { font-size: var(--fs-label); letter-spacing: 2pt; color: var(--dim); margin: 0 0 8pt 0; }
.col-title { font-size: 20pt; font-weight: var(--fw-bold); color: var(--accent-2); margin: 0 0 10pt 0; line-height: 1.3; }
.col-lede { font-size: var(--fs-body); color: var(--muted); margin: 0 0 14pt 0; line-height: 1.5; }
.col-bullets { list-style: none; padding: 0; margin: 0; }
.col-bullets li { font-size: var(--fs-body); color: var(--fg); margin: 0 0 6pt 0; padding-left: 14pt; position: relative; line-height: 1.5; }
.col-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--accent); }

.divider { width: 1pt; background: var(--dim); align-self: stretch; }

.source { font-size: var(--fs-source); color: var(--faint); letter-spacing: 1pt; margin: 12pt 0 0 0; }
</style></head>
<body>
<div class="slide">
  <p class="eyebrow">SECTION · COMPARE</p>
  <h1 class="title">标题：<span class="accent">A</span> vs <span class="accent">B</span></h1>

  <div class="cols">
    <div class="col">
      <p class="col-label">LEFT · A</p>
      <h2 class="col-title">左栏标题（较短）</h2>
      <p class="col-lede">左栏的一句概括</p>
      <ul class="col-bullets">
        <li>要点 1</li>
        <li>要点 2</li>
        <li>要点 3</li>
      </ul>
    </div>
    <div class="divider"></div>
    <div class="col">
      <p class="col-label">RIGHT · B</p>
      <h2 class="col-title">右栏标题</h2>
      <p class="col-lede">右栏的一句概括</p>
      <ul class="col-bullets">
        <li>要点 1</li>
        <li>要点 2</li>
        <li>要点 3</li>
      </ul>
    </div>
  </div>

  <p class="source">Source · 数据来源</p>
</div>
</body>
</html>
